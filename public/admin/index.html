<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager · Suhas Adiga</title>
    <!-- Absolute path so config loads at /admin or /admin/ -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <!-- crypto.randomUUID is only available in secure contexts (HTTPS/localhost).
         This polyfill uses crypto.getRandomValues which works over plain HTTP. -->
    <script>
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID !== 'function') {
        crypto.randomUUID = function () {
          return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, function (c) {
            return (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16);
          });
        };
      }
    </script>
    <!-- Manual init so we can set local_backend.url from window.location,
         making the CMS work from localhost AND any LAN IP without config changes. -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      var h = window.location.hostname;
      // Treat loopback and RFC-1918 ranges as local dev environments.
      var isLocal =
        h === 'localhost' || h === '127.0.0.1' ||
        /^10\./.test(h) ||
        /^192\.168\./.test(h) ||
        /^172\.(1[6-9]|2[0-9]|3[01])\./.test(h);

      var origin =
        window.location.protocol + '//' + h +
        (window.location.port ? ':' + window.location.port : '');

      // Load config.yml first, then override only local_backend so the URL
      // always points back to this same origin via the Next.js proxy.
      CMS.init({
        config: {
          load_config_file: true,
          local_backend: isLocal
            ? { url: origin + '/api/decap', allowed_hosts: [h] }
            : false,
        },
      });

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function (user) {
          if (!user) {
            window.netlifyIdentity.on('login', function () {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
  </body>
</html>
